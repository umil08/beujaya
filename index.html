<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BEUJAYA</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-wrap { width:100%; max-width:380px; padding:16px; }
    .login-card {
      background:var(--bg2); border:1px solid var(--border);
      border-radius:16px; padding:36px 32px;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
    }
    .login-logo {
      width:52px; height:52px; margin:0 auto 20px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:14px; display:flex; align-items:center; justify-content:center;
      font-size:26px; color:#000;
    }
    .login-title { text-align:center; font-size:20px; font-weight:700; letter-spacing:1px; margin-bottom:4px; }
    .login-sub   { text-align:center; font-size:12px; color:var(--text3); margin-bottom:28px; letter-spacing:0.5px; }
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:44px; }
    .pw-eye {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:var(--text3);
      font-size:16px; padding:4px;
    }
    .pw-eye:hover { color:var(--text); }
    .login-btn {
      width:100%; padding:11px; margin-top:20px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#000; font-weight:800; font-size:14px; letter-spacing:1px;
      border:none; border-radius:8px; cursor:pointer;
      transition:all 0.15s; font-family:var(--font-ui);
    }
    .login-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,229,160,0.3); }
    .login-btn:active { transform:none; }
    .login-err {
      background:rgba(255,71,87,0.1); border:1px solid rgba(255,71,87,0.3);
      color:var(--danger); border-radius:6px;
      padding:9px 12px; font-size:13px; text-align:center;
      margin-bottom:14px; display:none;
    }
    .login-footer { text-align:center; margin-top:20px; font-size:11px; color:var(--text3); font-family:var(--font-mono); }
    .theme-float {
      position:fixed; top:16px; right:16px;
      background:var(--bg2); border:1px solid var(--border2);
      border-radius:8px; padding:6px 10px;
      cursor:pointer; font-size:16px;
    }
  </style>
</head>
<body>
<button class="theme-float" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">⬡</div>
    <div class="login-title">BEUJAYA</div>
    <div class="login-sub">FB AFFILIATE TOOL</div>

    <div class="login-err"></div>

    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" name="username" id="userInput"
          placeholder="your username" autocomplete="username" autofocus
          maxlength="50" style="margin-bottom:0">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input type="password" class="form-control" name="password" id="pwInput"
            placeholder="your password" autocomplete="current-password"
            maxlength="128">
          <button type="button" class="pw-eye" onclick="togglePw()" id="pwEye">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="login-btn">LOGIN &#10141;</button>
    </form>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:var(--text3)">
      <a href="#" onclick="alert('Demo — contact admin to reset.');return false" style="color:var(--accent2);text-decoration:none">&#128273; Forgot password?</a>
      &nbsp;&bull;&nbsp;
      <span style="color:var(--text3)">No account? Contact admin.</span>
    </div>

    <div class="login-footer">BEUJAYA &copy; 2026</div>
  </div>
</div>

<script>
(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';})();
function toggleTheme(){var n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'🌙':'☀️';}
function togglePw(){var i=document.getElementById('pwInput');i.type=i.type==='password'?'text':'password';}
// Client-side demo gate (static hosting — no backend). Credentials are not secret.
function doLogin(e){
  e.preventDefault();
  var u=document.getElementById('userInput').value.trim();
  var p=document.getElementById('pwInput').value;
  if(u==='admin'&&p==='beujaya2026'){
    sessionStorage.setItem('beujaya_auth','1');
    location.href='dashboard.html';
  }else{
    var el=document.querySelector('.login-err');
    el.textContent='Wrong username or password.';
    el.style.display='block';
  }
  return false;
}
</script>
</body>
</html>
